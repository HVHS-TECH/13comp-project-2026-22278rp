<!DOCTYPE html>
<html lang="en">

<head>
  <title>Guess the Number</title>
  <meta charset="UTF-8">
  <meta name="description" content="12COMP P5.play">
  <meta name="keywords" content="12COMP, P5.play">
  <meta name="author" content="Mr Britton">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="GTNstyle.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

  <!--Java script files-->

  <script type="module" src="./main.mjs"></script>

</head>

<!--***************************************************
  BODY
****************************************************-->

<body onload="fb_initialise(); fb_detectLoginChange(); fb_GetTargetNumber(); fb_DetectPlayers(); fb_StartGame()">

  <div class="grid-container">
    <div class="grid-item item1">
      <nav>
        <div id = "userPhoto"></div>
        <h1>VS</h1>
        <div id = "p2Photo"></div>
      </nav>
    </div>
    <div class="grid-item item2">
      <header>
        <h1>Guess the Number</h1>
      </header>
    </div>
    <div class="grid-item item3">
      <main>
        <label for="name">Player 1:</label>
        <input type="number" id="player1Guess" player1Guess="player1Guess" required min="1" max="100" />
        <div id = buttonP1></div>
        <h1>VS</h1>
        <label for="name">Player 2:</label>
        <input type="number" id="player2Guess" player2Guess="player2Guess" required min="1" max="100" />
        <div id = buttonP2></div>

        <h3>Player 1 guesses:</h3>

        <h3>Player 2 guesses:</h3>

      </main>
    </div>
    <div class="grid-item item4">
      <footer>

      </footer>
    </div>
  </div>
</body>

</html>
<!--***************************************************
  END OF INDEX.HTML
****************************************************-->
